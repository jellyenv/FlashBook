name: pre-commit

on:
  push:
  pull_request:

jobs:
  pre-commit:

    runs-on: ubuntu-latest

    # Deterministic, self-contained values so hooks that import the app don't
    # depend on repo secrets (works on any fork). SKIP excludes the two codegen
    # hooks: they regenerate committed artifacts (OpenAPI schema + frontend
    # client) and need the full runtime; the dedicated CI workflow validates
    # both apps. Run them locally to refresh generated files.
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/testdatabase
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/testdatabase
      ACCESS_SECRET_KEY: ci-access-secret-key
      RESET_PASSWORD_SECRET_KEY: ci-reset-password-secret-key
      VERIFICATION_SECRET_KEY: ci-verification-secret-key
      OPENAPI_OUTPUT_FILE: ../nextjs-frontend/openapi.json
      CORS_ORIGINS: '["*"]'
      SKIP: generate-openapi-schema,generate-frontend-client


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install the project
        working-directory: ./fastapi_backend
        run: uv sync --all-extras --dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        working-directory: ./nextjs-frontend
        run: pnpm install

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1